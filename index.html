<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewBase | Find Your Ideal Coffee & WiFi Spot</title>
    <meta name="description"
        content="Discover the best coffee shops for remote work and social gatherings. Premium cafe directory with high-speed WiFi and work indicators.">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="glass"
        style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px; z-index: 1000; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
        <div class="logo" style="font-family: var(--font-heading); font-weight: 700; font-size: 1.5rem;">
            <span style="color: var(--mocha-gold);">BREW</span>BASE
        </div>
        <div class="nav-links" style="display: flex; gap: 30px; align-items: center;">
            <a href="#" class="active">Explore</a>
            <a href="pricing.html">Pricing</a>
            <a href="#" class="btn btn-primary">Join Community</a>
        </div>
    </nav>

    <header
        style="height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; position: relative; padding: 0 5%;">
        <div class="hero-bg"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(10, 10, 11, 0.7), rgba(10, 10, 11, 0.9)), url('C:/Users/Roshan g/.gemini/antigravity/brain/defb3405-1fff-423a-ac94-377b834cc9b0/brewbase_hero_preview_1773417945188.png'); background-size: cover; background-position: center; z-index: -1;">
        </div>

        <div class="hero-content animate-fade-up">
            <h1 class="gradient-text" style="font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 20px; line-height: 1.1;">
                Work Better,<br>Drink Better.</h1>
            <p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto 40px; color: #ADB5BD;">Curated cafe spaces
                designed for digital nomads and power groups. High-speed WiFi, guaranteed.</p>

            <div class="search-container glass" style="display: flex; padding: 8px; max-width: 600px; margin: 0 auto;">
                <input type="text" placeholder="Search by city or vibe..."
                    style="background: transparent; border: none; padding: 15px; color: white; flex: 1; outline: none; font-size: 1rem;">
                <button class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
            </div>
        </div>
    </header>

    <main id="explore" style="padding: var(--section-padding);">
        <div class="filter-header"
            style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; flex-wrap: wrap; gap: 20px;">
            <div>
                <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Nearby Spots</h2>
                <p style="color: #6C757D;">Handpicked locations verified by our community.</p>
            </div>
            <div class="filter-tabs glass" style="padding: 5px; display: flex;">
                <button class="filter-btn active" onclick="filterCafes('all')"
                    style="padding: 10px 25px; border-radius: 15px; border: none; background: var(--mocha-gold); color: var(--espresso-black); font-weight: 600; cursor: pointer;">All</button>
                <button class="filter-btn" onclick="filterCafes('work')"
                    style="padding: 10px 25px; border-radius: 15px; border: none; background: transparent; color: white; cursor: pointer;">Work
                    Vibe</button>
                <button class="filter-btn" onclick="filterCafes('group')"
                    style="padding: 10px 25px; border-radius: 15px; border: none; background: transparent; color: white; cursor: pointer;">Group</button>
            </div>
        </div>

        <div id="cafe-grid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px;">
            <!-- Cafe Cards injected via JS -->
        </div>
    </main>

    <footer style="padding: 60px 0; text-align: center; border-top: 1px solid var(--glass-border);">
        <p style="color: #6C757D;">&copy; 2026 BrewBase SaaS. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
